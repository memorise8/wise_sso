services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AUTH_DB_ADMIN_PASSWORD:?Set AUTH_DB_ADMIN_PASSWORD before starting postgres}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:?Set AUTH_DB_PASSWORD before starting postgres}
      AUTH_DB_NAME: ${AUTH_DB_NAME:-auth_db}
      AUTH_DB_USER: ${AUTH_DB_USER:-auth_user}
    ports:
      - "${AUTH_DB_PORT:-5432}:5432"
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
      - ./ops/init-local-postgres.sh:/docker-entrypoint-initdb.d/10-auth-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${AUTH_DB_USER:-auth_user}\" -d \"$${AUTH_DB_NAME:-auth_db}\""]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  auth-postgres-data:
